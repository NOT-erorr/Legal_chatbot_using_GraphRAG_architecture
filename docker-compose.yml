#  GraphRAG – Vietnamese Legal Document System
#  Local stack: PostgreSQL 15 + Redis 7 (storage) · FastAPI backend · Nginx/React frontend
#  Qdrant (vector) + Neo4j (graph) dùng CLOUD — cấu hình trong orchestrator/.env

services:
  # ── PostgreSQL 15 — Relational storage (users, conversations, messages) ────
  postgres:
    image: postgres:15-alpine
    container_name: graphrag-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-legal_chatbot}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Auto-run chatbot schema on first startup
      - ./db/chatbot_schema.sql:/docker-entrypoint-initdb.d/01_chatbot_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - graphrag-net

  # ── Redis 7 — Cache + rate limit + analytics stream ────────────────────────
  redis:
    image: redis:7-alpine
    container_name: graphrag-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - graphrag-net

  # ── Orchestrator Backend — LangGraph + FastAPI ─────────────────────────────
  backend:
    build:
      context: ./orchestrator
    container_name: graphrag-backend
    restart: unless-stopped
    ports:
      - "8001:8080"
    env_file:
      - ./orchestrator/.env
    # Override host/url để dùng tên service trong mạng Docker
    # (file .env dùng localhost cho dev chạy uvicorn ngoài Docker).
    # Qdrant + Neo4j KHÔNG override → giữ giá trị cloud trong .env.
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/health').status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s
    networks:
      - graphrag-net

  # ── Web UI & API Gateway — Nginx + React ───────────────────────────────────
  # Nginx serve SPA và reverse-proxy /api/ → backend (xem frontend/nginx.conf).
  # Build với VITE_API_URL="" để frontend gọi API bằng đường dẫn tương đối (same-origin).
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
    container_name: graphrag-frontend
    restart: unless-stopped
    ports:
      - "80:8080"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - graphrag-net

networks:
  graphrag-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
