server {
    # Run on port 8080 (Common constraint for Google Cloud Run containerized Apps)
    listen 8080;

    server_name localhost;

    # ── 1. Serve frontend SPA ────────────────────────────────────────────────
    location / {
        root   /usr/share/nginx/html;
        index  index.html;

        # This handles React Router's client side routing: if file isn't found, fallback to index.html
        try_files $uri $uri/ /index.html;
    }

    # ── 2. API Gateway: reverse-proxy /api/ → backend container ──────────────
    # Frontend gọi /api/v1/... (same-origin) → nginx chuyển sang backend:8080.
    # Tránh CORS và bỏ hardcode URL. "backend" phân giải qua Docker DNS.
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # LangGraph + Gemini có thể chậm → nới timeout
        proxy_connect_timeout 10s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;
    }

    # ── 3. (Tùy chọn) proxy health check của backend ─────────────────────────
    location = /health {
        proxy_pass       http://backend:8080/health;
        proxy_set_header Host $host;
    }
}
