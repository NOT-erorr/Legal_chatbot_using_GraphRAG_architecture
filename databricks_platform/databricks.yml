bundle:
  name: vn-legal-lakehouse-platform

resources:
  jobs:
    vn_legal_lakehouse_etl:
      name: vn-legal-lakehouse-etl
      max_concurrent_runs: 1
      tasks:
        - task_key: bronze_ingestion
          job_cluster_key: etl_cluster
          spark_python_task:
            python_file: jobs/run_pipeline.py
            parameters:
              - --stage
              - bronze
          libraries:
            - pypi:
                package: datasets==2.21.0
            - pypi:
                package: google-genai>=0.7.0
            - pypi:
                package: qdrant-client>=1.12.1
            - pypi:
                package: neo4j>=5.25.0

        - task_key: silver_transform
          depends_on:
            - task_key: bronze_ingestion
          job_cluster_key: etl_cluster
          spark_python_task:
            python_file: jobs/run_pipeline.py
            parameters:
              - --stage
              - silver

        - task_key: gold_embedding_and_sync
          depends_on:
            - task_key: silver_transform
          job_cluster_key: etl_cluster
          spark_python_task:
            python_file: jobs/run_pipeline.py
            parameters:
              - --stage
              - gold

      job_clusters:
        - job_cluster_key: etl_cluster
          new_cluster:
            spark_version: 15.4.x-scala2.12
            node_type_id: Standard_DS3_v2
            num_workers: 2
            autotermination_minutes: 30

targets:
  dev:
    default: true
    workspace:
      host: https://adb-<workspace-id>.<region>.azuredatabricks.net
