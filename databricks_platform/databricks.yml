bundle:
  name: vn-legal-lakehouse-platform

resources:
  jobs:
    vn_legal_lakehouse_etl:
      name: vn-legal-lakehouse-etl
      max_concurrent_runs: 1
      queue:
        enabled: true
      
      parameters:
        - name: CHECKPOINT_BASE_DIR
          default: "dbfs:/Volumes/main/law_lakehouse/checkpoints"
      
      tasks:
        - task_key: bronze_ingestion
          environment_key: default
          spark_python_task:
            python_file: jobs/run_pipeline.py
            parameters:
              - --stage
              - bronze

        - task_key: silver_transform
          depends_on:
            - task_key: bronze_ingestion
          environment_key: default
          spark_python_task:
            python_file: jobs/run_pipeline.py
            parameters:
              - --stage
              - silver

        - task_key: gold_embedding_and_sync
          depends_on:
            - task_key: silver_transform
          environment_key: default
          spark_python_task:
            python_file: jobs/run_pipeline.py
            parameters:
              - --stage
              - gold

      environments:
        - environment_key: default
          spec:
            environment_version: "2"
            dependencies:
              - datasets==2.21.0
              - google-genai>=0.7.0
              - qdrant-client>=1.12.1
              - neo4j>=5.25.0

targets:
  dev:
    default: true
    workspace:
      host: https://dbc-deb12fe1-b137.cloud.databricks.com
    sync:
      include:
        - ".env"
