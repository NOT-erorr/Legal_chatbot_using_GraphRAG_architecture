name: Deploy Backend (Cloud Run)

# Build + deploy Orchestrator (FastAPI) lên Google Cloud Run.
# min-instances=0 → scale-to-zero → $0 khi idle (nằm trong free tier cho demo).

on:
  push:
    branches: [main]
    paths:
      - "orchestrator/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

env:
  SERVICE: orchestrator
  REGION: asia-southeast1

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE" \
            --source orchestrator \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region "$REGION" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 2 \
            --timeout 300 \
            --set-env-vars "^@^LOG_LEVEL=info@ORCHESTRATOR_HOST=0.0.0.0@ORCHESTRATOR_PORT=8080@GEMINI_CHAT_MODEL=gemini-2.5-flash@GEMINI_TEMPERATURE=0.1@GEMINI_MAX_OUTPUT_TOKENS=2048@GEMINI_EMBEDDING_MODEL=gemini-embedding-001@QDRANT_COLLECTION=vn_legal_chunks@QDRANT_TOP_K=5@QDRANT_SCORE_THRESHOLD=0.3@NEO4J_USER=neo4j@NEO4J_DATABASE=neo4j@NEO4J_MAX_DEPTH=2@NEO4J_MAX_RELATED=5@POSTGRES_PORT=5432@REDIS_CACHE_TTL=300@GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}@QDRANT_URL=${{ secrets.QDRANT_URL }}@QDRANT_API_KEY=${{ secrets.QDRANT_API_KEY }}@NEO4J_URI=${{ secrets.NEO4J_URI }}@NEO4J_PASSWORD=${{ secrets.NEO4J_PASSWORD }}@POSTGRES_HOST=${{ secrets.POSTGRES_HOST }}@POSTGRES_DB=${{ secrets.POSTGRES_DB }}@POSTGRES_USER=${{ secrets.POSTGRES_USER }}@POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}@JWT_SECRET=${{ secrets.JWT_SECRET }}@GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}"

      - name: Show service URL
        run: |
          echo "Backend URL:"
          gcloud run services describe "$SERVICE" --region "$REGION" \
            --project "${{ secrets.GCP_PROJECT_ID }}" --format='value(status.url)'
          echo "::notice::Đặt giá trị này vào repo Variable BACKEND_URL để frontend build dùng."
